delete_task:
  name: Delete task
  description: Delete one or more TidyQuest tasks.
  fields:
    entity_id:
      name: Task sensor
      selector:
        entity:
          integration: tidyquest
          domain: sensor
          multiple: true
    task_id:
      name: Task ID
      selector:
        number:
          min: 1
          mode: box

reset_task:
  name: Reset task
  description: Reset one or more TidyQuest tasks to dirty/due, removing today's completion records.
  fields:
    entity_id:
      name: Task sensor
      description: TidyQuest task sensor entity to reset.
      selector:
        entity:
          integration: tidyquest
          domain: sensor
          multiple: true
    task_id:
      name: Task ID
      description: TidyQuest task id to reset when not using an entity.
      selector:
        number:
          min: 1
          mode: box

refresh:
  name: Refresh
  description: Refresh TidyQuest rooms, users, and task sensors now.
