complete_task:
  name: Complete task
  description: Complete one or more TidyQuest tasks. The Home Assistant user name is matched to a TidyQuest display name or username unless a user is supplied.
  fields:
    entity_id:
      name: Task sensor
      description: TidyQuest task sensor entity to complete.
      selector:
        entity:
          integration: tidyquest
          domain: sensor
          multiple: true
    task_id:
      name: Task ID
      description: TidyQuest task id to complete when not using an entity.
      selector:
        number:
          min: 1
          mode: box
    user_name:
      name: User name
      description: TidyQuest display name or username to complete the task for.
      selector:
        text:
    tidyquest_user_id:
      name: TidyQuest user ID
      description: Explicit TidyQuest user id to complete the task for.
      selector:
        number:
          min: 1
          mode: box

create_task:
  name: Create task
  description: Create a TidyQuest task in a room.
  fields:
    room_id:
      name: Room ID
      description: TidyQuest room id.
      selector:
        number:
          min: 1
          mode: box
    room_name:
      name: Room name
      description: TidyQuest room name.
      selector:
        text:
    name:
      name: Name
      required: true
      selector:
        text:
    notes:
      name: Notes
      selector:
        text:
    frequency_days:
      name: Frequency days
      selector:
        number:
          min: 0.0417
          step: 0.5
          mode: box
    effort:
      name: Effort
      selector:
        number:
          min: 1
          max: 5
          mode: slider
    health:
      name: Initial health
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider
    assigned_users:
      name: Assigned users
      description: TidyQuest display names or usernames.
      selector:
        text:
          multiple: true
    assignment_mode:
      name: Assignment mode
      selector:
        select:
          options:
            - first
            - shared
            - custom
    on_demand:
      name: On demand
      selector:
        boolean:
    show_in_dashboard:
      name: Show in dashboard
      selector:
        boolean:
    is_seasonal:
      name: Seasonal
      selector:
        boolean:
    icon_key:
      name: Icon key
      selector:
        text:

